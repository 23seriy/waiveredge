name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run hermetic tests
        working-directory: backend
        # test_api.py and test_recommendations.py contain a few tests that build
        # fixtures from stats.nba.com — blocked on GitHub's datacenter IPs. They
        # are excluded until CI fixtures/mocks land (roadmap Phase 3). Everything
        # else (scoring core, projections, matchups, categories, name resolution,
        # scoring systems, ESPN transactions/connect, config guard) runs here.
        run: python -m pytest tests/ --ignore=tests/test_api.py --ignore=tests/test_recommendations.py -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      # `npm run lint` (next lint) is intentionally omitted: ESLint isn't
      # configured yet, so it drops into an interactive setup prompt that fails
      # in CI. Configuring ESLint is a roadmap Phase 3 task; build is the gate.
      - name: Build
        working-directory: frontend
        run: npm run build
