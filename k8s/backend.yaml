---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: waiveredge
data:
  DATABASE_URL: "postgresql+psycopg2://waiveredge:waiveredge@postgres:5432/waiveredge"
  CORS_ORIGINS: "http://localhost:3000,http://frontend.waiveredge.svc.cluster.local:3000"
  APP_SECRET: "minikube-dev-secret"
  YAHOO_GAME_KEY: "nba"
  SEASON: "2025"
  PORT: "8000"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: waiveredge
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: waiveredge-backend:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: waiveredge
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
