# Local Postgres for development. The scoring prototype does NOT need this —
# it runs on bundled fixtures. This is for the DB-backed API + ingestion.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: waiveredge
      POSTGRES_PASSWORD: waiveredge
      POSTGRES_DB: waiveredge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/0001_init.sql:/docker-entrypoint-initdb.d/0001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waiveredge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
