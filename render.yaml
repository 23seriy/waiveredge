# Render Blueprint — deploy backend + Postgres in one click.
# https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Push this file to GitHub
#   2. Go to https://dashboard.render.com/blueprints → New Blueprint Instance
#   3. Connect your repo → Render creates the web service + database
#   4. Set the env vars marked "sync: false" in the Render dashboard

services:
  - type: web
    name: waiveredge-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    region: ohio
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: waiveredge-db
          property: connectionString
      - key: CORS_ORIGINS
        value: http://localhost:3000,https://waiveredge.vercel.app
      - key: APP_SECRET
        generateValue: true
      - key: YAHOO_CLIENT_ID
        sync: false
      - key: YAHOO_CLIENT_SECRET
        sync: false
      - key: YAHOO_REDIRECT_URI
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_MONTHLY_PRICE_ID
        sync: false
      - key: STRIPE_PRO_SEASON_PRICE_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: WaiverEdge <onboarding@resend.dev>

databases:
  - name: waiveredge-db
    plan: free
    region: ohio
    databaseName: waiveredge
    user: waiveredge
